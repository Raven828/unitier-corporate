<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Gradients for modern look -->
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f4f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="characterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#1e293b"/>
  
  <!-- Desktop wallpaper pattern -->
  <pattern id="desktopPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
    <rect width="100" height="100" fill="#334155"/>
    <circle cx="50" cy="50" r="2" fill="#475569" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#desktopPattern)"/>
  
  <!-- Main application window -->
  <rect x="200" y="100" width="800" height="600" rx="12" fill="url(#windowGrad)" filter="url(#shadow)"/>
  
  <!-- Window title bar -->
  <rect x="200" y="100" width="800" height="60" rx="12" fill="url(#headerGrad)"/>
  <rect x="200" y="148" width="800" height="12" fill="url(#headerGrad)"/>
  
  <!-- Window controls -->
  <circle cx="230" cy="130" r="8" fill="#ef4444"/>
  <circle cx="255" cy="130" r="8" fill="#f59e0b"/>
  <circle cx="280" cy="130" r="8" fill="#10b981"/>
  
  <!-- Application title -->
  <text x="600" y="140" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="20" font-weight="600">DesktopMate</text>
  
  <!-- Character area (left side) -->
  <rect x="220" y="180" width="280" height="400" fill="white" rx="8"/>
  
  <!-- Character illustration -->
  <ellipse cx="360" cy="500" rx="80" ry="20" fill="#e5e7eb"/>
  
  <!-- Character body -->
  <circle cx="360" cy="380" r="60" fill="url(#characterGrad)"/>
  
  <!-- Character features -->
  <circle cx="345" cy="365" r="4" fill="#1f2937"/>
  <circle cx="375" cy="365" r="4" fill="#1f2937"/>
  <path d="M345 385 Q360 395 375 385" stroke="#1f2937" stroke-width="2" fill="none"/>
  
  <!-- Character limbs -->
  <ellipse cx="315" cy="420" rx="12" ry="25" fill="url(#characterGrad)"/>
  <ellipse cx="405" cy="420" rx="12" ry="25" fill="url(#characterGrad)"/>
  <ellipse cx="340" cy="460" rx="8" ry="20" fill="url(#characterGrad)"/>
  <ellipse cx="380" cy="460" rx="8" ry="20" fill="url(#characterGrad)"/>
  
  <!-- Chat/interaction panel (right side) -->
  <rect x="520" y="180" width="460" height="400" fill="white" rx="8"/>
  
  <!-- Chat header -->
  <rect x="520" y="180" width="460" height="50" fill="#f3f4f6" rx="8"/>
  <text x="750" y="210" text-anchor="middle" fill="#374151" font-family="system-ui, sans-serif" font-size="16" font-weight="500">チャット・交流</text>
  
  <!-- Chat messages -->
  <rect x="540" y="250" width="300" height="30" rx="15" fill="#3b82f6"/>
  <text x="550" y="270" fill="white" font-family="system-ui, sans-serif" font-size="12">こんにちは！今日はどんなお手伝いしましょうか？</text>
  
  <rect x="620" y="300" width="320" height="30" rx="15" fill="#e5e7eb"/>
  <text x="630" y="320" fill="#374151" font-family="system-ui, sans-serif" font-size="12">今日のスケジュールを教えてもらえる？</text>
  
  <rect x="540" y="350" width="280" height="30" rx="15" fill="#3b82f6"/>
  <text x="550" y="370" fill="white" font-family="system-ui, sans-serif" font-size="12">午後2時に会議の予定がありますね！</text>
  
  <!-- Status indicators -->
  <circle cx="560" cy="520" r="6" fill="#10b981"/>
  <text x="575" y="525" fill="#374151" font-family="system-ui, sans-serif" font-size="11">オンライン</text>
  
  <circle cx="680" cy="520" r="6" fill="#f59e0b"/>
  <text x="695" y="525" fill="#374151" font-family="system-ui, sans-serif" font-size="11">アクティブ</text>
  
  <!-- Input field -->
  <rect x="540" y="540" width="380" height="25" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="550" y="557" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">メッセージを入力...</text>
  
  <!-- Bottom status bar -->
  <rect x="200" y="680" width="800" height="20" fill="#f3f4f6"/>
  <text x="220" y="695" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">DesktopMate v2.1.0 | Unity Engine | インフィニットループ株式会社</text>
  
  <!-- Taskbar (bottom of screen) -->
  <rect x="0" y="760" width="1200" height="40" fill="#374151"/>
  <rect x="20" y="770" width="100" height="20" rx="4" fill="#4b5563"/>
  <text x="70" y="782" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10">DesktopMate</text>
</svg>