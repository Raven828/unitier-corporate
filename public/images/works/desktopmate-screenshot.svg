<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chatBubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>
  
  <!-- Desktop background -->
  <rect width="1200" height="800" fill="#1e293b"/>
  
  <!-- Application window -->
  <rect x="100" y="80" width="1000" height="640" rx="12" fill="url(#windowGrad)" filter="url(#dropShadow)"/>
  
  <!-- Title bar -->
  <rect x="100" y="80" width="1000" height="40" rx="12" fill="url(#titleBarGrad)"/>
  <rect x="100" y="108" width="1000" height="12" fill="url(#titleBarGrad)"/>
  
  <!-- Window controls -->
  <circle cx="125" cy="100" r="6" fill="#ef4444"/>
  <circle cx="145" cy="100" r="6" fill="#f59e0b"/>
  <circle cx="165" cy="100" r="6" fill="#10b981"/>
  
  <!-- Application title -->
  <text x="600" y="105" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">DesktopMate - Virtual Assistant</text>
  
  <!-- Main content area -->
  <rect x="120" y="140" width="960" height="560" fill="white" rx="8"/>
  
  <!-- Left sidebar -->
  <rect x="120" y="140" width="250" height="560" fill="#f1f5f9" rx="8"/>
  
  <!-- Character display area -->
  <rect x="140" y="160" width="210" height="280" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Character (anime-style avatar) -->
  <g>
    <!-- Head -->
    <ellipse cx="245" cy="220" rx="40" ry="45" fill="#ffd6cc"/>
    <!-- Hair -->
    <path d="M205,185 Q245,150 285,185 Q285,200 275,210 Q245,170 215,210 Q205,200 205,185" fill="#8b4513"/>
    <!-- Eyes -->
    <ellipse cx="230" cy="210" rx="8" ry="12" fill="white"/>
    <ellipse cx="260" cy="210" rx="8" ry="12" fill="white"/>
    <circle cx="230" cy="210" r="5" fill="#2563eb"/>
    <circle cx="260" cy="210" r="5" fill="#2563eb"/>
    <circle cx="232" cy="208" r="2" fill="white"/>
    <circle cx="262" cy="208" r="2" fill="white"/>
    <!-- Nose -->
    <line x1="245" y1="220" x2="245" y2="225" stroke="#ffb3a6" stroke-width="1"/>
    <!-- Mouth -->
    <path d="M240,235 Q245,240 250,235" fill="none" stroke="#ff9999" stroke-width="2"/>
    <!-- Body -->
    <rect x="220" y="265" width="50" height="80" fill="#3b82f6" rx="8"/>
    <!-- Arms -->
    <rect x="200" y="275" width="15" height="40" fill="#ffd6cc" rx="7"/>
    <rect x="275" y="275" width="15" height="40" fill="#ffd6cc" rx="7"/>
  </g>
  
  <!-- Character info panel -->
  <rect x="140" y="460" width="210" height="120" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="485" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Akira</text>
  <text x="245" y="505" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="12">Desktop Assistant</text>
  
  <!-- Status indicators -->
  <circle cx="160" cy="520" r="4" fill="#10b981"/>
  <text x="175" y="525" fill="#374151" font-family="Arial, sans-serif" font-size="11">Active</text>
  <circle cx="160" cy="540" r="4" fill="#3b82f6"/>
  <text x="175" y="545" fill="#374151" font-family="Arial, sans-serif" font-size="11">Learning Mode</text>
  <circle cx="160" cy="560" r="4" fill="#f59e0b"/>
  <text x="175" y="565" fill="#374151" font-family="Arial, sans-serif" font-size="11">Voice: ON</text>
  
  <!-- Chat area -->
  <rect x="390" y="140" width="690" height="560" fill="white" rx="8"/>
  
  <!-- Chat header -->
  <rect x="390" y="140" width="690" height="50" fill="#f8fafc" rx="8"/>
  <text x="735" y="170" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Chat with Akira</text>
  
  <!-- Chat messages -->
  <g>
    <!-- User message -->
    <rect x="600" y="210" width="460" height="40" rx="20" fill="#e5e7eb"/>
    <text x="830" y="235" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">今日の天気はどうですか？</text>
    
    <!-- Assistant response -->
    <rect x="410" y="270" width="480" height="60" rx="20" fill="url(#chatBubbleGrad)"/>
    <text x="650" y="290" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">今日の東京の天気は晴れ、最高気温は25度です。</text>
    <text x="650" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">お出かけ予定はありますか？</text>
    
    <!-- User message -->
    <rect x="620" y="350" width="440" height="40" rx="20" fill="#e5e7eb"/>
    <text x="840" y="375" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">はい、公園に行く予定です</text>
    
    <!-- Assistant response -->
    <rect x="410" y="410" width="500" height="80" rx="20" fill="url(#chatBubbleGrad)"/>
    <text x="660" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">素晴らしいですね！公園での散歩は健康に良いです。</text>
    <text x="660" y="450" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">日差しが強いので、帽子や日焼け止めをお忘れなく。</text>
    <text x="660" y="470" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">楽しい時間をお過ごしください！</text>
  </g>
  
  <!-- Input area -->
  <rect x="410" y="620" width="630" height="40" fill="#f1f5f9" rx="20" stroke="#d1d5db" stroke-width="1"/>
  <text x="430" y="645" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">メッセージを入力...</text>
  
  <!-- Send button -->
  <circle cx="1020" cy="640" r="15" fill="#3b82f6"/>
  <path d="M1015,635 L1025,640 L1015,645 Z" fill="white"/>
  
  <!-- Menu bar -->
  <rect x="120" y="120" width="960" height="20" fill="#f8fafc"/>
  <text x="140" y="135" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">File</text>
  <text x="180" y="135" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Edit</text>
  <text x="220" y="135" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">View</text>
  <text x="260" y="135" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Settings</text>
  <text x="320" y="135" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Help</text>
</svg>