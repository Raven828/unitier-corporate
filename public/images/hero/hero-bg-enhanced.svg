<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary accent gradient -->
    <radialGradient id="accentGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="techGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <circle cx="40" cy="40" r="1" fill="rgba(255,255,255,0.1)"/>
    </pattern>
    
    <!-- Circuit pattern -->
    <pattern id="circuit" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none"/>
      <path d="M20,20 L80,20 L80,40 L60,40 L60,60 L80,60 L80,80" 
            stroke="rgba(139,92,246,0.2)" stroke-width="2" fill="none"/>
      <circle cx="20" cy="20" r="3" fill="rgba(139,92,246,0.3)"/>
      <circle cx="80" cy="40" r="3" fill="rgba(139,92,246,0.3)"/>
      <circle cx="60" cy="60" r="3" fill="rgba(139,92,246,0.3)"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#mainGrad)"/>
  
  <!-- Tech grid overlay -->
  <rect width="1920" height="1080" fill="url(#techGrid)"/>
  
  <!-- Circuit pattern overlay -->
  <rect width="1920" height="1080" fill="url(#circuit)" opacity="0.3"/>
  
  <!-- Large accent circles -->
  <circle cx="300" cy="200" r="150" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="1620" cy="880" r="200" fill="url(#accentGrad)" opacity="0.4"/>
  <circle cx="1200" cy="300" r="120" fill="url(#accentGrad)" opacity="0.5"/>
  
  <!-- Floating geometric elements -->
  <!-- Hexagon cluster (top right) -->
  <g transform="translate(1400,150)" opacity="0.2">
    <polygon points="30,0 60,15 60,45 30,60 0,45 0,15" fill="white"/>
    <polygon points="90,30 120,45 120,75 90,90 60,75 60,45" fill="rgba(139,92,246,0.8)"/>
    <polygon points="30,90 60,105 60,135 30,150 0,135 0,105" fill="rgba(59,130,246,0.8)"/>
  </g>
  
  <!-- Digital elements (left side) -->
  <g transform="translate(100,400)" opacity="0.15">
    <!-- Data visualization bars -->
    <rect x="0" y="80" width="8" height="40" fill="white"/>
    <rect x="15" y="60" width="8" height="60" fill="rgba(139,92,246,0.9)"/>
    <rect x="30" y="40" width="8" height="80" fill="white"/>
    <rect x="45" y="70" width="8" height="50" fill="rgba(59,130,246,0.9)"/>
    <rect x="60" y="20" width="8" height="100" fill="white"/>
    <rect x="75" y="55" width="8" height="65" fill="rgba(139,92,246,0.9)"/>
    
    <!-- Connected nodes -->
    <circle cx="120" cy="60" r="4" fill="white"/>
    <circle cx="160" cy="80" r="4" fill="rgba(139,92,246,0.9)"/>
    <circle cx="200" cy="40" r="4" fill="white"/>
    <line x1="120" y1="60" x2="160" y2="80" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <line x1="160" y1="80" x2="200" y2="40" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
  </g>
  
  <!-- VR/AR elements (bottom right) -->
  <g transform="translate(1500,800)" opacity="0.12">
    <!-- VR headset silhouette -->
    <ellipse cx="50" cy="30" rx="45" ry="20" fill="white"/>
    <rect x="10" y="20" width="80" height="20" rx="10" fill="rgba(139,92,246,0.8)"/>
    <circle cx="30" cy="30" r="8" fill="rgba(59,130,246,0.9)"/>
    <circle cx="70" cy="30" r="8" fill="rgba(59,130,246,0.9)"/>
  </g>
  
  <!-- Floating particles/data points -->
  <g opacity="0.4" filter="url(#glow)">
    <circle cx="400" cy="300" r="2" fill="#fbbf24"/>
    <circle cx="800" cy="200" r="1.5" fill="#10b981"/>
    <circle cx="1200" cy="500" r="2" fill="#ef4444"/>
    <circle cx="600" cy="700" r="1" fill="#8b5cf6"/>
    <circle cx="1000" cy="800" r="1.5" fill="#06b6d4"/>
    <circle cx="300" cy="600" r="1" fill="#f59e0b"/>
    <circle cx="1400" cy="400" r="2" fill="#ec4899"/>
    <circle cx="700" cy="400" r="1" fill="#84cc16"/>
  </g>
  
  <!-- Subtle animation paths -->
  <g opacity="0.1">
    <path d="M0,540 Q480,440 960,540 T1920,540" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
    <path d="M0,400 Q640,300 1280,400 Q1600,450 1920,400" stroke="rgba(139,92,246,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Technology keywords (very subtle) -->
  <g opacity="0.05" font-family="system-ui, sans-serif" fill="white">
    <text x="200" y="900" font-size="14" font-weight="300">Unity</text>
    <text x="400" y="950" font-size="12" font-weight="300">VR/AR</text>
    <text x="600" y="920" font-size="14" font-weight="300">Metaverse</text>
    <text x="1000" y="940" font-size="12" font-weight="300">Innovation</text>
    <text x="1300" y="900" font-size="14" font-weight="300">札幌</text>
    <text x="1500" y="960" font-size="12" font-weight="300">Technology</text>
  </g>
  
  <!-- Central focal point -->
  <circle cx="960" cy="540" r="300" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>
  <circle cx="960" cy="540" r="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="960" cy="540" r="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>